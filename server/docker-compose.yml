version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: assetflow-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: assetflow_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-db-data:/var/lib/mysql

  web-backend:
    build: .
    container_name: assetflow-backend-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASS=password
      - DB_NAME=assetflow_db
      - JWT_SECRET=your_docker_env_corporate_secret_jwt_signature_key
      - GOOGLE_CLIENT_ID=816937494129-qlo971fs0eavbk195e0fu3fkak01pfrh.apps.googleusercontent.com
    depends_on:
      - mysql-db

volumes:
  mysql-db-data:
